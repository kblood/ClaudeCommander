; cc.ini -- Claude Commander options (read once at startup)
;
; Lines are "key = value".  ';' or '#' begin a comment; [section] lines are
; ignored.  Unknown keys/values are skipped.  Edit and restart cc to apply.

; Initial sort order:  name | ext | size | date
sort = name

; Right-hand column:  size | date | time | attr
columns = size
