; cc.ini -- Claude Commander options (read once at startup)
;
; Lines are "key = value".  ';' or '#' begin a comment.  Unknown keys/values
; are skipped.  Edit and restart cc to apply.

; Initial sort order:  name | ext | size | date
sort = name

; Right-hand column:  size | date | time | attr
columns = size

; Container handlers: press Enter on a file with one of these extensions to
; browse it AS A FOLDER (and F5 to copy a member out).  Each maps an extension
; to an external helper .COM -- drop in a new helper + add a line to support a
; new format.  CCZIP ships with cc; CCRAR/CCARJ/CCD64/CCT64 are future helpers.
[open]
zip = CCZIP
